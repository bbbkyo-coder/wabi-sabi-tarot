<title>Wabi Sabi Tarot</title>

<style>

body{
background:#f4f1ea;
font-family:serif;
text-align:center;
padding:30px;
}

h1{
font-size:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:1000px;

}

.card{
background:white;
padding:20px;
border-radius:12px;
text-decoration:none;
color:black;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card:hover{
transform:translateY(-5px);
}

</style>

</head>

<body>

<h1>Wabi Sabi Tarot</h1>

<p>侘び寂びタロット 大アルカナ</p>

</html>
